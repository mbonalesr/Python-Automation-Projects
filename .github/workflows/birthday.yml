name: Automated Birthday Wisher

on:
  schedule:
    # Esto usa formato CRON. "0 13 * * *" significa que correrá todos los días a las 13:00 UTC (Aprox 7:00 AM o 8:00 AM en México dependiendo del horario)
    - cron: "0 13 * * *"
  # Esto te permite agregar un botón en GitHub para correrlo manualmente cuando quieras probarlo
  workflow_dispatch:

jobs:
  run-birthday-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas python-dotenv

      - name: Ejecutar el script
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          # Entramos a la carpeta de tu proyecto específico
          cd 28_Automated_Birthday_Wisher
          # Ejecutamos el archivo principal
          python main.py